spring:
  application:
    name: sc-auth
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        file-extension: yml
        shared-configs:
          - data-id: application-common.yml
            group: DEFAULT_GROUP
            refresh: true

server:
  port: 9200

# Sa-Token
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: 1800
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# 免鉴权路径
sc:
  security:
    ignore-urls:
      - /auth/login
      - /auth/logout
      - /auth/captcha
      - /doc.html
      - /webjars/**
      - /swagger-resources/**
      - /v3/api-docs/**
