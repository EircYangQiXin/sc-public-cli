spring:
  application:
    name: sc-demo
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        file-extension: yml
        shared-configs:
          - data-id: application-common.yml
            group: DEFAULT_GROUP
            refresh: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_ADDR:localhost:3306}/sc_demo?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PWD:guest}

server:
  port: 9202

# XXL-JOB
xxl:
  job:
    admin:
      addresses: http://${XXLJOB_ADDR:localhost:8081}/xxl-job-admin
    executor:
      appname: sc-demo
      port: 9999

# OSS (MinIO 示例)
sc:
  oss:
    endpoint: http://${MINIO_ADDR:localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: sc-public
  security:
    ignore-urls:
      - /demo/health
      - /doc.html
      - /webjars/**
      - /swagger-resources/**
      - /v3/api-docs/**
